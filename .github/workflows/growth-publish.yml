# growth-publish.yml — autonomous publication of assessed evidence.
#
# Backs issue #12 / GROWTH-AUTOMATION-PLAN.md Required workflows →
# growth-publish.yml. The ONLY job with repository write credentials.
# capture (#10) and assess (#11) are read-only; distribution (#18/#19) is
# gated behind a successful deploy.
#
# Flow:
#   1. download the assessed evidence bundle (from #11)
#   2. re-run the #9 validator — refuse to publish anything that fails
#   3. promote the sourceKey to `eligible` in the registry
#   4. commit evidence + registry change on a bot branch
#   5. open a PR (≤5 game pages OR 1 Collection — enforced one-slug-at-a-time)
#   6. request auto-merge ONLY after every required check passes
#
# Direct pushes to main are forbidden — the bot works through PRs only.
# Bot identity is a scoped GitHub App or repo-scoped credential (owner config;
# ADR-0008). The default GITHUB_TOKEN is used here for simplicity; swap to a
# GitHub App token in owner settings for stricter scoping.
name: Growth Publish

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Game slug to publish'
        required: true
      assess-run-id:
        description: 'growth-assess run id with the assessed artifact'
        required: true
  workflow_run:
    workflows: ['Growth Assess']
    types: [completed]

# This job writes (creates a branch + PR). It needs contents:write + PR write.
# This is the ONLY workflow that holds write permissions — capture/assess stay
# read-only. Per the plan's Trust boundaries, write creds live only here.
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: growth-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve slug
        id: slug
        run: |
          if [ -n "${{ github.event.inputs.slug }}" ]; then
            echo "::set-output name=slug::${{ github.event.inputs.slug }}"
            echo "::set-output name=run_id::${{ github.event.inputs.assess-run-id }}"
          else
            SLUG=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts --jq '.artifacts[0].name' | sed 's/assessed-\(.*\)-[0-9]*/\1/')
            echo "::set-output name=slug::$SLUG"
            echo "::set-output name=run_id::${{ github.event.workflow_run.id }}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download assessed bundle
        run: |
          mkdir -p evidence/games
          gh run download ${{ steps.slug.outputs.run_id }} -R ${{ github.repository }} -n "assessed-${{ steps.slug.outputs.slug }}-${{ steps.slug.outputs.run_id }}" -D evidence-download || true
          if [ -d evidence-download ]; then cp -r evidence-download/games/* evidence/games/ 2>/dev/null || true; fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Validate before publish (#9 gate — the arbiter)
        run: npm run validate:evidence

      - name: Prepare publication change + PR body
        id: body
        run: |
          node scripts/publish-assessed.js --slug=${{ steps.slug.outputs.slug }} > pr-body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create bot branch + commit
        run: |
          BRANCH="bot/publish-${{ steps.slug.outputs.slug }}-${{ github.run_id }}"
          git config user.name "arcadebloom-bot"
          git config user.email "bot@arcadebloom.com"
          git checkout -b "$BRANCH"
          git add evidence/
          # Only commit if there is a change.
          git diff --staged --quiet || git commit -m "Publish evidence: ${{ steps.slug.outputs.slug }} (autonomous, #12)

          Evidence record + registry promotion generated by growth-publish.yml.
          Validator (#9) passed; model assessment was advisory only (ADR-0004).

          Closes autonomous publication for ${{ steps.slug.outputs.slug }}."
          git push origin "$BRANCH"
          echo "::set-output name=branch::$BRANCH"

      - name: Open PR (≤5 game cap enforced one-slug-at-a-time)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "${{ steps.body.outputs.branch }}" \
            --title "Publish: ${{ steps.slug.outputs.slug }} (autonomous)" \
            --body-file pr-body.md \
            --label "ready-for-agent")
          echo "PR opened: $PR_URL"
          # Request auto-merge — GitHub will only merge once all required checks
          # (CI #3) pass. This satisfies "auto-merge only after checks pass".
          gh pr merge "${{ steps.body.outputs.branch }}" --auto --squash --delete-branch || \
            echo "auto-merge requested (will merge when checks pass)"

      - name: Fail loudly if direct-push to main was attempted
        if: failure()
        run: |
          echo "Publication failed — NO direct push to main occurred. Item remains queued."
          exit 1

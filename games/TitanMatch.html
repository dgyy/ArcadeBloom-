<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Titan Match - Greek Mythology Match-3 Adventure</title>
    <style>
        html[data-tw-preload] body {
            visibility: hidden;
        }
    </style>
    <script>
        document.documentElement.setAttribute('data-tw-preload', 'true');
    </script>
    <script defer src="https://cdn.tailwindcss.com"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.documentElement.removeAttribute('data-tw-preload');
        });
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #2d3748;
            overflow: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .game-board {
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
            max-width: 95vw;
            max-height: 95vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #gameCanvas {
            display: block;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 100%;
            max-height: 60vh;
            width: auto;
            height: auto;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
        }

        .ui-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 5px;
        }

        .ui-bottom {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 8px 12px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            font-size: 12px;
            font-weight: 600;
            color: #4a5568;
            pointer-events: auto;
            min-width: 80px;
            text-align: center;
            margin: 2px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            flex: 1;
        }

        @media (max-width: 768px) {
            .info-box {
                font-size: 10px;
                padding: 6px 8px;
                min-width: 60px;
            }
            
            .game-title {
                font-size: 24px;
            }
            
            .btn {
                padding: 8px 16px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .info-box {
                font-size: 9px;
                padding: 4px 6px;
                min-width: 50px;
            }
            
            .game-title {
                font-size: 20px;
            }
            
            .btn {
                padding: 6px 12px;
                font-size: 12px;
            }
            
            .ui-overlay {
                padding: 10px;
            }
        }

        .info-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .score-display {
            font-family: 'Cinzel', serif;
            font-size: 18px;
            color: #d69e2e;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .level-display {
            font-family: 'Cinzel', serif;
            font-size: 16px;
            color: #805ad5;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .moves-display {
            font-family: 'Cinzel', serif;
            font-size: 16px;
            color: #38a169;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .game-title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Cinzel', serif;
            font-size: 32px;
            font-weight: 700;
            color: #f7fafc;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            background: linear-gradient(45deg, #d69e2e, #f6ad55, #f6e05e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            z-index: 10;
        }

        .game-over-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .modal-title {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            font-weight: 700;
            color: #4a5568;
            margin-bottom: 20px;
        }

        .modal-score {
            font-size: 24px;
            color: #d69e2e;
            margin-bottom: 30px;
        }

        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            animation: particle-float 2s ease-out forwards;
        }

        @keyframes particle-float {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(0);
            }
        }

        .gem {
            transition: all 0.3s ease;
        }

        .gem:hover {
            transform: scale(1.1);
            filter: brightness(1.2);
        }

        .gem.selected {
            transform: scale(1.2);
            filter: brightness(1.5) drop-shadow(0 0 10px rgba(255, 255, 255, 0.8));
        }

        .combo-text {
            position: absolute;
            font-family: 'Cinzel', serif;
            font-size: 24px;
            font-weight: 700;
            color: #f6e05e;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            animation: combo-animation 1s ease-out forwards;
            pointer-events: none;
        }

        @keyframes combo-animation {
            0% {
                opacity: 0;
                transform: scale(0.5) translateY(0);
            }
            50% {
                opacity: 1;
                transform: scale(1.2) translateY(-20px);
            }
            100% {
                opacity: 0;
                transform: scale(1) translateY(-40px);
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-title">Titan Match</div>
        
        <div class="game-board">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <div class="ui-overlay">
                <div class="ui-top">
                    <div class="info-box score-display">
                        <div>Score</div>
                        <div id="score">0</div>
                    </div>
                    <div class="info-box level-display">
                        <div>Level</div>
                        <div id="level">1</div>
                    </div>
                    <div class="info-box moves-display">
                        <div>Moves</div>
                        <div id="moves">30</div>
                    </div>
                </div>
                
                <div class="ui-bottom">
                    <button class="btn" onclick="resetGame()">New Game</button>
                    <button class="btn" onclick="showHint()">Hint</button>
                </div>
            </div>
        </div>
    </div>

    <div class="game-over-modal" id="gameOverModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Level Complete!</div>
            <div class="modal-score" id="modalScore">Score: 0</div>
            <button class="btn" onclick="nextLevel()">Next Level</button>
            <button class="btn" onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <script>
        class TitanMatch {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.boardSize = 8;
                this.board = [];
                this.selectedTile = null;
                this.score = 0;
                this.level = 1;
                this.moves = 30;
                this.isAnimating = false;
                this.resizeCanvas();
                
                // Add resize listener
                window.addEventListener('resize', () => this.resizeCanvas());
                
                // Greek mythology themed gems
                this.gemTypes = [
                    { name: 'Zeus', color: '#f6e05e', symbol: '⚡', rarity: 0.15 },
                    { name: 'Poseidon', color: '#4299e1', symbol: '🌊', rarity: 0.15 },
                    { name: 'Athena', color: '#9f7aea', symbol: '🦉', rarity: 0.15 },
                    { name: 'Hercules', color: '#ed8936', symbol: '🦁', rarity: 0.15 },
                    { name: 'Aphrodite', color: '#f687b3', symbol: '🌹', rarity: 0.15 },
                    { name: 'Apollo', color: '#48bb78', symbol: '☀️', rarity: 0.15 },
                    { name: 'Artemis', color: '#38b2ac', symbol: '🏹', rarity: 0.15 },
                    { name: 'Hermes', color: '#ed64a6', symbol: '⚡', rarity: 0.15 }
                ];
                
                this.initializeBoard();
                this.setupEventListeners();
                this.updateUI();
                this.gameLoop();
            }
            
            initializeBoard() {
                this.board = [];
                for (let row = 0; row < this.boardSize; row++) {
                    this.board[row] = [];
                    for (let col = 0; col < this.boardSize; col++) {
                        this.board[row][col] = this.getRandomGem();
                    }
                }
                // Ensure no initial matches
                this.removeInitialMatches();
            }
            
            getRandomGem() {
                const rand = Math.random();
                let cumulativeRarity = 0;
                
                for (let gem of this.gemTypes) {
                    cumulativeRarity += gem.rarity;
                    if (rand <= cumulativeRarity) {
                        return {
                            type: gem.name,
                            color: gem.color,
                            symbol: gem.symbol,
                            x: 0,
                            y: 0,
                            targetX: 0,
                            targetY: 0,
                            isAnimating: false
                        };
                    }
                }
                
                // Fallback to first gem type
                return {
                    type: this.gemTypes[0].name,
                    color: this.gemTypes[0].color,
                    symbol: this.gemTypes[0].symbol,
                    x: 0,
                    y: 0,
                    targetX: 0,
                    targetY: 0,
                    isAnimating: false
                };
            }
            
            removeInitialMatches() {
                let hasMatches = true;
                while (hasMatches) {
                    hasMatches = false;
                    const matches = this.findMatches();
                    if (matches.length > 0) {
                        hasMatches = true;
                        for (let match of matches) {
                            for (let tile of match) {
                                this.board[tile.row][tile.col] = this.getRandomGem();
                            }
                        }
                    }
                }
            }
            
            resizeCanvas() {
                const container = this.canvas.parentElement;
                const maxSize = Math.min(container.clientWidth - 30, container.clientHeight - 100, 400);
                this.canvas.width = maxSize;
                this.canvas.height = maxSize;
                this.tileSize = this.canvas.width / this.boardSize;
            }
            
            setupEventListeners() {
                this.canvas.addEventListener('click', (e) => this.handleClick(e));
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.handleClick(e.touches[0]);
                });
                
                // Prevent context menu on right click
                this.canvas.addEventListener('contextmenu', (e) => e.preventDefault());
            }
            
            handleClick(e) {
                if (this.isAnimating) return;
                
                const rect = this.canvas.getBoundingClientRect();
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;
                
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;
                
                const col = Math.floor(x / this.tileSize);
                const row = Math.floor(y / this.tileSize);
                
                if (row >= 0 && row < this.boardSize && col >= 0 && col < this.boardSize) {
                    if (!this.selectedTile) {
                        this.selectedTile = { row, col };
                    } else {
                        if (this.isAdjacent(this.selectedTile, { row, col })) {
                            this.swapTiles(this.selectedTile, { row, col });
                        } else {
                            // Select new tile if not adjacent
                            this.selectedTile = { row, col };
                        }
                    }
                } else {
                    // Click outside board, deselect
                    this.selectedTile = null;
                }
            }
            
            isAdjacent(tile1, tile2) {
                const rowDiff = Math.abs(tile1.row - tile2.row);
                const colDiff = Math.abs(tile1.col - tile2.col);
                return (rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1);
            }
            
            swapTiles(tile1, tile2) {
                const temp = this.board[tile1.row][tile1.col];
                this.board[tile1.row][tile1.col] = this.board[tile2.row][tile2.col];
                this.board[tile2.row][tile2.col] = temp;
                
                this.moves--;
                this.updateUI();
                
                // Check for matches after swap
                setTimeout(() => {
                    const matches = this.findMatches();
                    if (matches.length === 0) {
                        // No matches, swap back
                        this.board[tile2.row][tile2.col] = this.board[tile1.row][tile1.col];
                        this.board[tile1.row][tile1.col] = temp;
                        this.moves++; // Restore the move
                        this.updateUI();
                    } else {
                        this.processMatches();
                    }
                }, 300);
            }
            
            findMatches() {
                const matches = [];
                
                // Check horizontal matches
                for (let row = 0; row < this.boardSize; row++) {
                    for (let col = 0; col < this.boardSize - 2; col++) {
                        const gem1 = this.board[row][col];
                        const gem2 = this.board[row][col + 1];
                        const gem3 = this.board[row][col + 2];
                        
                        if (gem1.type === gem2.type && gem2.type === gem3.type) {
                            const match = [];
                            let c = col;
                            while (c < this.boardSize && this.board[row][c].type === gem1.type) {
                                match.push({ row, col: c });
                                c++;
                            }
                            matches.push(match);
                            col = c - 1;
                        }
                    }
                }
                
                // Check vertical matches
                for (let col = 0; col < this.boardSize; col++) {
                    for (let row = 0; row < this.boardSize - 2; row++) {
                        const gem1 = this.board[row][col];
                        const gem2 = this.board[row + 1][col];
                        const gem3 = this.board[row + 2][col];
                        
                        if (gem1.type === gem2.type && gem2.type === gem3.type) {
                            const match = [];
                            let r = row;
                            while (r < this.boardSize && this.board[r][col].type === gem1.type) {
                                match.push({ row: r, col });
                                r++;
                            }
                            matches.push(match);
                            row = r - 1;
                        }
                    }
                }
                
                return matches;
            }
            

            
            dropTiles() {
                // Drop tiles down
                for (let col = 0; col < this.boardSize; col++) {
                    let emptyRow = this.boardSize - 1;
                    for (let row = this.boardSize - 1; row >= 0; row--) {
                        if (this.board[row][col] !== null) {
                            if (row !== emptyRow) {
                                this.board[emptyRow][col] = this.board[row][col];
                                this.board[row][col] = null;
                            }
                            emptyRow--;
                        }
                    }
                    
                    // Fill empty spaces with new tiles
                    for (let row = emptyRow; row >= 0; row--) {
                        this.board[row][col] = this.getRandomGem();
                    }
                }
                
                this.updateUI();
                
                // Check for new matches
                setTimeout(() => {
                    this.processMatches();
                }, 300);
            }
            
            processMatches() {
                const matches = this.findMatches();
                
                if (matches.length === 0) {
                    this.isAnimating = false;
                    this.checkGameOver();
                    return;
                }
                
                this.isAnimating = true;
                
                // Calculate score
                let totalMatched = 0;
                for (let match of matches) {
                    totalMatched += match.length;
                    const baseScore = match.length * 10;
                    const comboMultiplier = Math.max(1, match.length - 2);
                    const score = baseScore * comboMultiplier * this.level;
                    this.score += score;
                    
                    // Create combo text
                    this.createComboText(match[0].row, match[0].col, `+${score}`);
                }
                
                // Remove matched tiles
                for (let match of matches) {
                    for (let tile of match) {
                        this.board[tile.row][tile.col] = null;
                    }
                }
                
                this.updateUI();
                
                // Drop tiles and fill empty spaces
                setTimeout(() => {
                    this.dropTiles();
                }, 500);
            }
            
            checkGameOver() {
                if (this.moves <= 0) {
                    this.gameOver();
                    return;
                }
                
                // Check if there are any possible moves
                for (let row = 0; row < this.boardSize; row++) {
                    for (let col = 0; col < this.boardSize; col++) {
                        // Check horizontal swap
                        if (col < this.boardSize - 1) {
                            const temp = this.board[row][col];
                            this.board[row][col] = this.board[row][col + 1];
                            this.board[row][col + 1] = temp;
                            
                            if (this.findMatches().length > 0) {
                                this.board[row][col] = this.board[row][col + 1];
                                this.board[row][col + 1] = temp;
                                return; // Found a possible move
                            }
                            
                            this.board[row][col] = this.board[row][col + 1];
                            this.board[row][col + 1] = temp;
                        }
                        
                        // Check vertical swap
                        if (row < this.boardSize - 1) {
                            const temp = this.board[row][col];
                            this.board[row][col] = this.board[row + 1][col];
                            this.board[row + 1][col] = temp;
                            
                            if (this.findMatches().length > 0) {
                                this.board[row][col] = this.board[row + 1][col];
                                this.board[row + 1][col] = temp;
                                return; // Found a possible move
                            }
                            
                            this.board[row][col] = this.board[row + 1][col];
                            this.board[row + 1][col] = temp;
                        }
                    }
                }
                
                // No possible moves, shuffle the board
                this.shuffleBoard();
            }
            
            shuffleBoard() {
                // Create a flat array of all gems
                const allGems = [];
                for (let row = 0; row < this.boardSize; row++) {
                    for (let col = 0; col < this.boardSize; col++) {
                        if (this.board[row][col]) {
                            allGems.push(this.board[row][col]);
                        }
                    }
                }
                
                // Shuffle the gems
                for (let i = allGems.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [allGems[i], allGems[j]] = [allGems[j], allGems[i]];
                }
                
                // Redistribute gems
                let gemIndex = 0;
                for (let row = 0; row < this.boardSize; row++) {
                    for (let col = 0; col < this.boardSize; col++) {
                        if (this.board[row][col]) {
                            this.board[row][col] = allGems[gemIndex++];
                        }
                    }
                }
                
                // Ensure no matches after shuffle
                this.removeInitialMatches();
            }
            
            createComboText(row, col, text) {
                const x = col * this.tileSize + this.tileSize / 2;
                const y = row * this.tileSize + this.tileSize / 2;
                
                const comboElement = document.createElement('div');
                comboElement.className = 'combo-text';
                comboElement.textContent = text;
                comboElement.style.left = `${x}px`;
                comboElement.style.top = `${y}px`;
                
                document.body.appendChild(comboElement);
                
                setTimeout(() => {
                    document.body.removeChild(comboElement);
                }, 1000);
            }
            
            createParticles(row, col) {
                const x = col * this.tileSize + this.tileSize / 2;
                const y = row * this.tileSize + this.tileSize / 2;
                
                for (let i = 0; i < 8; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = `${x}px`;
                    particle.style.top = `${y}px`;
                    particle.style.width = '4px';
                    particle.style.height = '4px';
                    particle.style.background = this.board[row][col].color;
                    
                    const angle = (i / 8) * Math.PI * 2;
                    const velocity = 50 + Math.random() * 50;
                    const vx = Math.cos(angle) * velocity;
                    const vy = Math.sin(angle) * velocity;
                    
                    particle.style.transform = `translate(${vx}px, ${vy}px)`;
                    
                    document.body.appendChild(particle);
                    
                    setTimeout(() => {
                        if (document.body.contains(particle)) {
                            document.body.removeChild(particle);
                        }
                    }, 2000);
                }
            }
            
            updateUI() {
                document.getElementById('score').textContent = this.score.toLocaleString();
                document.getElementById('level').textContent = this.level;
                document.getElementById('moves').textContent = this.moves;
            }
            
            gameOver() {
                const modal = document.getElementById('gameOverModal');
                const modalTitle = document.getElementById('modalTitle');
                const modalScore = document.getElementById('modalScore');
                
                if (this.moves <= 0) {
                    modalTitle.textContent = 'Game Over!';
                } else {
                    modalTitle.textContent = 'Level Complete!';
                }
                
                modalScore.textContent = `Final Score: ${this.score.toLocaleString()}`;
                modal.style.display = 'flex';
                this.isAnimating = true; // Prevent further interactions
            }
            
            showHint() {
                if (this.isAnimating) return;
                
                // Find possible moves
                for (let row = 0; row < this.boardSize; row++) {
                    for (let col = 0; col < this.boardSize; col++) {
                        // Check horizontal swap
                        if (col < this.boardSize - 1) {
                            const temp = this.board[row][col];
                            this.board[row][col] = this.board[row][col + 1];
                            this.board[row][col + 1] = temp;
                            
                            if (this.findMatches().length > 0) {
                                // Highlight the hint
                                this.selectedTile = { row, col };
                                setTimeout(() => {
                                    this.selectedTile = null;
                                }, 2000);
                                
                                // Restore the board
                                this.board[row][col] = this.board[row][col + 1];
                                this.board[row][col + 1] = temp;
                                return;
                            }
                            
                            this.board[row][col] = this.board[row][col + 1];
                            this.board[row][col + 1] = temp;
                        }
                        
                        // Check vertical swap
                        if (row < this.boardSize - 1) {
                            const temp = this.board[row][col];
                            this.board[row][col] = this.board[row + 1][col];
                            this.board[row + 1][col] = temp;
                            
                            if (this.findMatches().length > 0) {
                                this.selectedTile = { row, col };
                                setTimeout(() => {
                                    this.selectedTile = null;
                                }, 2000);
                                
                                this.board[row][col] = this.board[row + 1][col];
                                this.board[row + 1][col] = temp;
                                return;
                            }
                            
                            this.board[row][col] = this.board[row + 1][col];
                            this.board[row + 1][col] = temp;
                        }
                    }
                }
                
                // No hints available
                alert('No possible moves found! Board will be shuffled.');
                this.shuffleBoard();
            }
            
            draw() {
                // Clear canvas
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Draw background
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Draw grid
                this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                this.ctx.lineWidth = 1;
                
                for (let i = 0; i <= this.boardSize; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i * this.tileSize, 0);
                    this.ctx.lineTo(i * this.tileSize, this.canvas.height);
                    this.ctx.stroke();
                    
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, i * this.tileSize);
                    this.ctx.lineTo(this.canvas.width, i * this.tileSize);
                    this.ctx.stroke();
                }
                
                // Draw gems
                for (let row = 0; row < this.boardSize; row++) {
                    for (let col = 0; col < this.boardSize; col++) {
                        const gem = this.board[row][col];
                        if (gem) {
                            const x = col * this.tileSize;
                            const y = row * this.tileSize;
                            
                            // Check if this tile is selected
                            const isSelected = this.selectedTile && 
                                             this.selectedTile.row === row && 
                                             this.selectedTile.col === col;
                            
                            // Draw gem background
                            this.ctx.fillStyle = gem.color;
                            this.ctx.shadowColor = isSelected ? 'rgba(255, 255, 255, 0.8)' : 'rgba(0, 0, 0, 0.3)';
                            this.ctx.shadowBlur = isSelected ? 15 : 5;
                            
                            const padding = isSelected ? 4 : 8;
                            this.ctx.fillRect(x + padding, y + padding, 
                                            this.tileSize - padding * 2, 
                                            this.tileSize - padding * 2);
                            
                            // Draw gem symbol
                            this.ctx.fillStyle = 'white';
                            this.ctx.font = `${this.tileSize / 2}px Arial`;
                            this.ctx.textAlign = 'center';
                            this.ctx.textBaseline = 'middle';
                            this.ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                            this.ctx.shadowBlur = 2;
                            
                            this.ctx.fillText(gem.symbol, 
                                            x + this.tileSize / 2, 
                                            y + this.tileSize / 2);
                            
                            // Reset shadow
                            this.ctx.shadowBlur = 0;
                        }
                    }
                }
            }
            
            gameLoop() {
                this.draw();
                requestAnimationFrame(() => this.gameLoop());
            }
        }
        
        let game;
        
        function initGame() {
            game = new TitanMatch();
        }
        
        function resetGame() {
            game = new TitanMatch();
            document.getElementById('gameOverModal').style.display = 'none';
        }
        
        function nextLevel() {
            game.level++;
            game.moves = 30 + Math.floor(game.level * 5);
            game.initializeBoard();
            game.updateUI();
            document.getElementById('gameOverModal').style.display = 'none';
            game.isAnimating = false;
        }
        
        function showHint() {
            if (game && !game.isAnimating) {
                game.showHint();
            }
        }
        
        // Initialize game when page loads
        window.addEventListener('load', initGame);
    </script>
</body>
